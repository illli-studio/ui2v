display_name: ui2v
short_description: Build segmented, multi-library ui2v animation/video projects.
default_prompt: Plan a segmented ui2v storyboard using the video playbooks, choose the right runtime/template JSON shape and library stack, clone the closest maintained example when possible, write dependency-aware animation JSON, validate and lint the timeline, preview in Studio, render MP4, and export README-ready preview assets when requested.

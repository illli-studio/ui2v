    <rect x="78" y="66" width="228" height="228" rx="48" stroke="url(#markGradient)" stroke-width="18"/>
    <path d="M164 126C164 111 181 102 194 110L251 146C263 154 263 172 251 180L194 216C181 224 164 215 164 200V126Z" fill="url(#markGradient)"/>

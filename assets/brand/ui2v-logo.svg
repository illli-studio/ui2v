    <path d="M114 106H270" stroke="#DFF6FF" stroke-opacity="0.2" stroke-width="10" stroke-linecap="round"/>
  </g>
  <text x="374" y="211" fill="url(#wordGradient)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="154" font-weight="900" letter-spacing="0">ui2v</text>

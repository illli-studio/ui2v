<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ui2v logo</title>
  <desc id="desc">A cinematic ui2v wordmark with a play-shaped frame and browser video colors.</desc>
  <defs>
    <linearGradient id="markGradient" x1="72" y1="48" x2="306" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="0.48" stop-color="#7BD88F"/>
      <stop offset="1" stop-color="#F2AA4C"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="372" y1="90" x2="870" y2="268" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.58" stop-color="#D7E6F4"/>
      <stop offset="1" stop-color="#8EA8BE"/>
    </linearGradient>
    <filter id="softShadow" x="18" y="18" width="330" height="330" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#00101C" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="44" fill="#050914"/>
